name: Deploy browser version to GitHub Pages

# Publishes the in-browser WordStar (web/) to GitHub Pages so anyone can use
# it from a URL with nothing to install.
#
# One-time setup: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". Then the site lives at
# https://<owner>.github.io/<repo>/

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
