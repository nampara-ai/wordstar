name: Build offline bundle

# Produces WordStar-4-portable.zip: WordStar + the browser build + DOSBox
# Staging for macOS / Windows / Linux, so it runs offline with zero installs.
#
# GitHub's runners have open network access, so this is where the DOSBox
# binaries get fetched and bundled (the dev sandbox that created this repo
# could not reach the release CDN).
#
# Run it from the Actions tab (workflow_dispatch) or by pushing a v* tag.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y xz-utils unzip zip

      - name: Fetch DOSBox Staging for all platforms
        run: |
          ./scripts/fetch-dosbox.sh linux
          ./scripts/fetch-dosbox.sh windows
          ./scripts/fetch-dosbox.sh macos     # stashes the raw .dmg for first-run unpack

      - name: Build the browser bundle
        run: ./scripts/build-web.sh

      - name: Assemble the portable package
        run: |
          STAGE=WordStar-4
          rm -rf "$STAGE" dist; mkdir -p "$STAGE" dist
          cp -R ws4 web native config docs scripts "$STAGE"/
          cp README.md WordStar.command WordStar.bat WordStar.desktop wordstar.sh "$STAGE"/
          # don't ship throwaway runtime state
          rm -f "$STAGE"/native/.dosbox.generated.conf
          rm -rf "$STAGE"/drive
          (cd "$STAGE" && zip -qr ../dist/WordStar-4-portable.zip .)
          ls -lh dist

      - name: Upload as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordStar-4-portable
          path: dist/WordStar-4-portable.zip

      - name: Publish the release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: WordStar 4.0 — ${{ github.ref_name }}
          files: dist/WordStar-4-portable.zip
          fail_on_unmatched_files: true
          body: |
            **The real 1987 WordStar, on your modern computer. One click.**

            This release ships **`WordStar-4-portable.zip`** — WordStar 4.0 plus a
            private copy of DOSBox Staging for **macOS, Windows, and Linux** already
            inside. No install, no setup, no internet required.

            ### Get writing
            1. **Download `WordStar-4-portable.zip`** below and unzip it.
            2. Double-click the launcher for your OS:
               - 🍎 macOS — **`WordStar.command`** *(first time: right-click → Open)*
               - 🪟 Windows — **`WordStar.bat`** *(first time: More info → Run anyway)*
               - 🐧 Linux — **`WordStar.desktop`** *(or run `./wordstar.sh`)*
            3. Press **`D`** to create a document, **`Alt-Enter`** for full screen,
               and **`Ctrl-K S`** to save (early and often — it doesn't autosave).

            New to WordStar? The bundled **[manual](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/MANUAL.md)**
            and **[one-page cheat sheet](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/QUICK-REFERENCE.md)**
            have you fluent in half an hour.

            Prefer zero install? There's a browser edition too — see the README.

            ---
            *${{ github.ref_name }} — a nod to WordStar Release 4, humble enough not to
            call a lovingly-wrapped abandonware project “1.0.”*
