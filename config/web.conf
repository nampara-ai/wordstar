# DOSBox config baked into the browser (.jsdos) build.
# The js-dos runtime extracts the bundle's files into the working
# directory, so we mount "." as C: and boot straight into WordStar.

[cpu]
# "auto" keeps WordStar responsive without melting the CPU on a text editor.
cycles=auto

[autoexec]
@echo off
mount c .
c:
cls
ws
